services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: bankingdb
      POSTGRES_USER: tommy
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - db

volumes:
  pgdata: